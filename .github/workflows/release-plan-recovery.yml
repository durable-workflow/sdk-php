name: Release plan recovery

run-name: Recover PHP SDK from ${{ inputs.plan_tag || 'latest public release plan' }}

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:
    inputs:
      plan_tag:
        description: Immutable release-plan tag; empty selects the newest public plan
        required: false
        type: string
        default: ''

permissions:
  attestations: read
  contents: write

concurrency:
  group: release-plan-recovery-sdk-php-${{ inputs.plan_tag || 'latest' }}
  cancel-in-progress: false

jobs:
  recover:
    name: Recover exact PHP SDK release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: packagist
    steps:
      - uses: actions/checkout@v6

      - name: Discover plan and verify release authority
        id: recovery
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUESTED_PLAN_TAG: ${{ inputs.plan_tag }}
        run: |
          arguments=(
            resolve
            --component sdk-php
            --plan-output release-plan.json
            --evidence release-recovery-evidence.json
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$GITHUB_EVENT_NAME" = schedule ]; then
            arguments+=(--allow-empty)
          elif [ -n "$REQUESTED_PLAN_TAG" ]; then
            arguments+=(--plan-tag "$REQUESTED_PLAN_TAG")
          fi
          python scripts/ci/component-release-recovery.py "${arguments[@]}"

      - name: Create or verify the planned source tag and GitHub Release
        if: steps.recovery.outputs.action == 'publish'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.recovery.outputs.version }}
          RELEASE_COMMIT: ${{ steps.recovery.outputs.commit }}
          RELEASE_PLAN_TAG: ${{ steps.recovery.outputs.plan_tag }}
        run: |
          python scripts/ci/publish-planned-source.py \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --plan-tag "$RELEASE_PLAN_TAG" \
            --evidence source-publication-evidence.json

      - name: Wait for Packagist source identity
        if: steps.recovery.outputs.action == 'publish'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/ci/component-release-recovery.py verify \
            --component sdk-php --plan release-plan.json --registry-only \
            --attempts 30 --sleep 20 --evidence registry-publication-evidence.json

      - name: Verify completed public release
        if: steps.recovery.outputs.action == 'publish'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/ci/component-release-recovery.py verify \
            --component sdk-php --plan release-plan.json \
            --attempts 3 --sleep 5 --evidence release-completion-evidence.json

      - name: Retain recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-php-release-recovery-${{ steps.recovery.outputs.plan || github.run_id }}
          path: |
            release-plan.json
            release-recovery-evidence.json
            source-publication-evidence.json
            registry-publication-evidence.json
            release-completion-evidence.json
          if-no-files-found: warn
