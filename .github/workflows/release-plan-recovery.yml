name: Release plan recovery

run-name: Recover PHP SDK from ${{ inputs.plan_tag || 'latest public release plan' }}

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:
    inputs:
      plan_tag:
        description: Immutable release-plan tag; empty selects the newest public plan
        required: false
        type: string
        default: ''

permissions:
  attestations: read
  contents: read

concurrency:
  group: release-plan-recovery-sdk-php-${{ inputs.plan_tag || 'latest' }}
  cancel-in-progress: false

jobs:
  discover:
    name: Discover PHP SDK release recovery
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      action: ${{ steps.recovery.outputs.action }}
      artifact-digest: ${{ steps.privileged-handoff.outputs.artifact-digest }}
      artifact-id: ${{ steps.privileged-handoff.outputs.artifact-id }}
      commit: ${{ steps.recovery.outputs.commit }}
      plan: ${{ steps.recovery.outputs.plan }}
      plan_tag: ${{ steps.recovery.outputs.plan_tag }}
      source-run-attempt: ${{ github.run_attempt }}
      source-run-id: ${{ github.run_id }}
      version: ${{ steps.recovery.outputs.version }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6

      - name: Discover plan and verify release authority
        id: recovery
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REQUESTED_PLAN_TAG: ${{ inputs.plan_tag }}
        run: |
          arguments=(
            resolve
            --component sdk-php
            --plan-output release-plan.json
            --preparation-output release-preparation.json
            --evidence release-recovery-evidence.json
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$GITHUB_EVENT_NAME" = schedule ]; then
            arguments+=(--allow-empty)
          elif [ -n "$REQUESTED_PLAN_TAG" ]; then
            arguments+=(--plan-tag "$REQUESTED_PLAN_TAG")
          fi
          python scripts/ci/component-release-recovery.py "${arguments[@]}"

      - name: Retain discovery evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sdk-php-release-recovery-discovery-${{ github.run_id }}
          path: |
            release-plan.json
            release-preparation.json
            release-recovery-evidence.json
          if-no-files-found: warn

      - name: Package the privileged publication handoff as one immutable file
        run: |
          handoff=()
          for file in release-plan.json release-preparation.json release-recovery-evidence.json; do
            [ ! -f "$file" ] || handoff+=("$file")
          done
          if [ "${#handoff[@]}" -eq 0 ]; then
            printf 'release recovery produced no handoff evidence\n' >&2
            exit 1
          fi
          tar -cf release-recovery-handoff.tar "${handoff[@]}"

      - name: Bind the privileged publication handoff identity and digest
        id: privileged-handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          archive: false
          if-no-files-found: error
          path: release-recovery-handoff.tar

  publish:
    name: Publish exact PHP SDK release
    needs: discover
    if: >-
      github.ref == 'refs/heads/main' &&
      needs.discover.outputs.action == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release-plan-publication
    permissions:
      actions: read
      attestations: read
      contents: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Restore immutable plan evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          artifact-ids: ${{ needs.discover.outputs.artifact-id }}
          digest-mismatch: error
          github-token: ${{ github.token }}
          path: isolated-release-recovery
          repository: ${{ github.repository }}
          run-id: ${{ needs.discover.outputs.source-run-id }}

      - name: Validate the exact producer artifact before use
        env:
          ARTIFACT_DIRECTORY: isolated-release-recovery
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.discover.outputs.artifact-digest }}
          EXPECTED_ARTIFACT_ID: ${{ needs.discover.outputs.artifact-id }}
          EXPECTED_SOURCE_RUN_ATTEMPT: ${{ needs.discover.outputs.source-run-attempt }}
          EXPECTED_SOURCE_RUN_ID: ${{ needs.discover.outputs.source-run-id }}
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            printf 'producer artifact digest is not an exact SHA-256 digest\n' >&2
            exit 1
          fi
          for identity in "$EXPECTED_ARTIFACT_ID" "$EXPECTED_SOURCE_RUN_ID" "$EXPECTED_SOURCE_RUN_ATTEMPT"; do
            if [[ ! "$identity" =~ ^[1-9][0-9]*$ ]]; then
              printf 'producer artifact identity is invalid\n' >&2
              exit 1
            fi
          done
          if [[ ! "$ARTIFACT_DIRECTORY" =~ ^isolated-[a-z0-9][a-z0-9._-]*$ ]]; then
            printf 'artifact validation directory is unsafe\n' >&2
            exit 1
          fi
          mapfile -d '' entries < <(
            /usr/bin/find "$ARTIFACT_DIRECTORY" -mindepth 1 -maxdepth 1 -print0
          )
          if [ "${#entries[@]}" -ne 1 ] || [ ! -f "${entries[0]}" ] || [ -L "${entries[0]}" ]; then
            printf 'artifact handoff must contain exactly one regular file\n' >&2
            exit 1
          fi
          observed_digest="$(/usr/bin/sha256sum "${entries[0]}")"
          observed_digest="${observed_digest%% *}"
          if [ "$observed_digest" != "$EXPECTED_ARTIFACT_DIGEST" ]; then
            printf 'artifact digest mismatch: expected %s, got %s\n' \
              "$EXPECTED_ARTIFACT_DIGEST" "$observed_digest" >&2
            exit 1
          fi
          printf 'validated artifact %s from run %s attempt %s\n' \
            "$EXPECTED_ARTIFACT_ID" "$EXPECTED_SOURCE_RUN_ID" "$EXPECTED_SOURCE_RUN_ATTEMPT"

      - name: Extract the validated release recovery handoff
        run: tar -xf isolated-release-recovery/release-recovery-handoff.tar

      - name: Prepare repository source-tag authority
        id: source-tag-authority
        continue-on-error: true
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          fetch-depth: 0
          path: .release-authority
          persist-credentials: true
          ssh-key: ${{ secrets.RELEASE_PLAN_DEPLOY_KEY }}

      - name: Create or verify the planned source tag and GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.discover.outputs.version }}
          RELEASE_COMMIT: ${{ needs.discover.outputs.commit }}
          RELEASE_PLAN_TAG: ${{ needs.discover.outputs.plan_tag }}
        run: |
          python scripts/ci/publish-planned-source.py \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --plan-tag "$RELEASE_PLAN_TAG" \
            --git-directory "$GITHUB_WORKSPACE/.release-authority" \
            --evidence source-publication-evidence.json

      - name: Wait for Packagist source identity
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/ci/component-release-recovery.py verify \
            --component sdk-php --plan release-plan.json --registry-only \
            --attempts 30 --sleep 20 --evidence registry-publication-evidence.json

      - name: Verify completed public release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/ci/component-release-recovery.py verify \
            --component sdk-php --plan release-plan.json \
            --attempts 3 --sleep 5 --evidence release-completion-evidence.json

      - name: Retain recovery evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sdk-php-release-recovery-${{ needs.discover.outputs.plan || github.run_id }}
          path: |
            release-plan.json
            release-recovery-evidence.json
            source-publication-evidence.json
            registry-publication-evidence.json
            release-completion-evidence.json
          if-no-files-found: warn
