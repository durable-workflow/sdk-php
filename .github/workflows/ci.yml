name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist
      - name: Lint PHP
        run: find src tests examples -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: composer test
      - run: composer check-boundary

  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer analyse

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Check documentation links
        uses: docker://lycheeverse/lychee:0.24.2
        with:
          args: >-
            --no-progress
            --exclude https://php.durable-workflow.com/
            README.md docs/*.md
      - run: composer docs
      - run: test -s build/api/index.html

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install into a clean consumer project
        run: |
          consumer="$(mktemp -d)"
          cd "$consumer"
          composer init --name=durable-workflow/sdk-smoke --no-interaction
          composer config repositories.sdk path "$GITHUB_WORKSPACE"
          composer require durable-workflow/sdk:@dev --no-interaction --prefer-dist
          php -r 'require "vendor/autoload.php"; $codec = new DurableWorkflow\Codec\AvroPayloadCodec(); if ($codec->decode($codec->encode(["ok" => true])) !== ["ok" => true]) { exit(1); }'
          php "$GITHUB_WORKSPACE/scripts/check-registration-identity.php" \
            "$consumer/vendor/autoload.php" \
            source-development
      - name: Exercise the pre-publication identity guard
        env:
          RELEASE_TAG: 9.8.7
        run: composer check-release-identity

  release-recovery-boundary:
    name: Release recovery boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Exercise source creation, idempotency, mismatch, and permission failure
        run: python scripts/ci/test-publish-planned-source.py
      - name: Verify release recovery source contracts
        run: python scripts/ci/test-component-release-recovery.py

  target-branch-qualification:
    name: Target branch qualification
    if: ${{ always() }}
    needs: [test, analyse, docs, package-smoke, release-recovery-boundary]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every supported PHP and package cell
        env:
          TEST_RESULT: ${{ needs.test.result }}
          ANALYSIS_RESULT: ${{ needs.analyse.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          PACKAGE_RESULT: ${{ needs.package-smoke.result }}
          RECOVERY_RESULT: ${{ needs.release-recovery-boundary.result }}
        run: |
          test "$TEST_RESULT" = success
          test "$ANALYSIS_RESULT" = success
          test "$DOCS_RESULT" = success
          test "$PACKAGE_RESULT" = success
          test "$RECOVERY_RESULT" = success
