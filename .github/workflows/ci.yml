name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist
      - name: Lint PHP
        run: find src tests examples -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: composer test
      - run: composer check-boundary

  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer analyse

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Check documentation links
        uses: docker://lycheeverse/lychee:0.24.2
        with:
          args: >-
            --no-progress
            --exclude https://php.durable-workflow.com/
            README.md docs/*.md
      - run: composer docs
      - run: test -s build/api/index.html

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install into a clean consumer project
        run: |
          consumer="$(mktemp -d)"
          cd "$consumer"
          composer init --name=durable-workflow/sdk-smoke --no-interaction
          composer config repositories.sdk path "$GITHUB_WORKSPACE"
          composer require durable-workflow/sdk:@dev --no-interaction --prefer-dist
          php -r 'require "vendor/autoload.php"; $codec = new DurableWorkflow\Codec\AvroPayloadCodec(); if ($codec->decode($codec->encode(["ok" => true])) !== ["ok" => true]) { exit(1); }'
